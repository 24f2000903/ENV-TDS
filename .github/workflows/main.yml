name: Python Flask Cache Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'  # adjust if needed

      # Step 3: Cache Python dependencies
      - name: Prime cache ef3dd89
        id: prime-cache-ef3dd89
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: cache-ef3dd89

      # Step 4: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 5: Show whether cache was used
      - name: Show cache result
        run: echo "Cache hit? ${{ steps.prime-cache-ef3dd89.outputs.cache-hit }}"
