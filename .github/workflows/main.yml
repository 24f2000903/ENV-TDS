name: Cache Example Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # Step 2: Prime the cache for dependencies
      - name: Prime cache ef3dd89
        id: prime-cache-ef3dd89
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: cache-ef3dd89

      # Step 3: Install dependencies (only installs missing ones if cache hits)
      - name: Install dependencies
        run: npm install

      # Step 4: Show whether cache was used
      - name: Show cache result
        run: echo "Cache hit? ${{ steps.prime-cache-ef3dd89.outputs.cache-hit }}"
